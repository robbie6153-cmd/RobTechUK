<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Arrows - RobTechUK Arcade</title>
  <link rel="stylesheet" href="arrows.css" />
</head>

<body>
  <main class="arrows-page">
    <div class="top-bar">
      <button id="backBtn" class="top-box green-box">Back</button>

      <div class="top-box">
        <span>Round:</span>
        <strong id="roundText">1/5</strong>
      </div>

      <div class="top-box">
        <span>Moves:</span>
        <strong id="movesText">0</strong>
      </div>

      <div class="top-box">
        <span>Time:</span>
        <strong id="timeText">0s</strong>
      </div>
    </div>

<div class="difficulty-select">
  <button class="difficulty-btn" onclick="startGame('easy', this)">Easy</button>
  <button class="difficulty-btn" onclick="startGame('medium', this)">Medium</button>
  <button class="difficulty-btn" onclick="startGame('hard', this)">Hard</button>
</div>

    <h1>Target Pattern</h1>
    <div id="targetGrid" class="mini-grid"></div>

    <h1>Your Grid</h1>

    <section class="play-area">
      <div class="column-arrows top-arrows" id="topArrows"></div>

      <div class="middle-row">
        <div class="side-arrows" id="leftArrows"></div>
        <div id="playerGrid" class="main-grid"></div>
        <div class="side-arrows" id="rightArrows"></div>
      </div>

      <div class="column-arrows bottom-arrows" id="bottomArrows"></div>
    </section>

    <p id="message" class="message"></p>

    <div class="bottom-buttons">
      <button id="resetBtn">Reset Round</button>
      <button id="hintBtn">Hint</button>
    </div>

    <a class="home-link" href="index.html">Back to Brain Training</a>
  </main>

  <script src="arrows.js"></script>
</body>
</html>
