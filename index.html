<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RobTech</title>

  <style>
    body {
      margin: 0;
      padding: 0;
      background: #000;
    }

    .home-container {
      position: relative;
      width: 100%;
      max-width: 600px;
      margin: 0 auto;
    }

    .home-container img {
      width: 100%;
      height: auto;
      display: block;
    }

    .link {
      position: absolute;
      display: block;
      z-index: 10;
    }

    /* Example clickable areas (we’ll tweak later) */
    .lettersin {
      top: 60%;
      left: 20%;
      width: 60%;
      height: 8%;
    }

  </style>
</head>

<body>

  <div class="home-container">
    <img src="homepage.jpg" alt="RobTech Homepage">

    <!-- Example clickable area -->
    <a class="link lettersin" href="https://lettersin.co.uk"></a>

  </div>

</body>
</html>
