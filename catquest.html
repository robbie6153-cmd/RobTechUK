<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cat Quest - RobTechUK</title>
  <link rel="stylesheet" href="catquest.css?v=1">
</head>
<body>
  <div class="game-page">
    <a href="arcade.html" class="back-button">Back to Arcade</a>

    <h1>Cat Quest</h1>

    <div class="hud">
      <div>Time: <span id="time">60</span></div>
      <div>Score: <span id="score">0</span></div>
      <div>Lives Lost: <span id="livesLost">0</span></div>
    </div>

    <div class="instructions">
      Collect as many Dreamies as you can before time runs out. Avoid the dogs.
      If a dog catches you, the cat restarts, but the remaining Dreamies stay where they are.
    </div>

    <canvas id="gameCanvas" width="600" height="600"></canvas>

    <div class="controls-note">
      Use arrow keys on desktop. On mobile, use the on-screen controls.
    </div>

    <div class="mobile-controls">
      <button class="control-btn" data-dir="up">▲</button>
      <div class="middle-controls">
        <button class="control-btn" data-dir="left">◀</button>
        <button class="control-btn" data-dir="down">▼</button>
        <button class="control-btn" data-dir="right">▶</button>
      </div>
    </div>

    <div id="message" class="message"></div>
  </div>

  <script src="catquest.js?v=1"></script>
</body>
</html>
