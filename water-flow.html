<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

  <title>Water Flow - RobTechUK Arcade</title>

  <link rel="stylesheet" href="style.css?v=13">
  <link rel="stylesheet" href="water-flow.css?v=1">
</head>

<body class="water-flow-page">

  <main class="water-flow-container">

    <header class="water-flow-topbar">
      <div class="wf-stat">
        <span>Timer</span>
        <strong id="timer">30</strong>
      </div>

      <div class="wf-stat">
        <span>Score</span>
        <strong id="score">0</strong>
      </div>

      <div class="wf-next-tile">
        <span>Next</span>
        <div id="nextTile" class="wf-tile-preview">
          ?
        </div>
      </div>
    </header>

    <section class="wf-hold-area">
      <h2>Tile Queue</h2>

      <div id="tileQueue" class="wf-queue-grid">
        <div class="wf-queue-cell"></div>
        <div class="wf-queue-cell"></div>
        <div class="wf-queue-cell"></div>
        <div class="wf-queue-cell"></div>

        <div class="wf-queue-cell"></div>
        <div class="wf-queue-cell"></div>
        <div class="wf-queue-cell"></div>
        <div class="wf-queue-cell"></div>

        <div class="wf-queue-cell"></div>
        <div class="wf-queue-cell"></div>
        <div class="wf-queue-cell"></div>
        <div class="wf-queue-cell"></div>

        <div class="wf-queue-cell"></div>
        <div class="wf-queue-cell"></div>
        <div class="wf-queue-cell"></div>
        <div class="wf-queue-cell"></div>
      </div>
    </section>

    <section class="wf-game-area">
      <div id="waterGrid" class="wf-main-grid">
        <!-- 7 across x 9 down generated by JS -->
      </div>
    </section>

    <section id="gameMessage" class="wf-message">
      Place pipes before the water starts.
    </section>

    <section class="wf-buttons">
      <button id="startBtn" class="wf-button">Start Game</button>
      <button id="resetBtn" class="wf-button secondary">Reset</button>
    </section>

    <p class="wf-home-link">
      <a href="arcade.html">Back to Arcade</a>
    </p>

  </main>

  <script src="water-flow.js?v=1"></script>

</body>
</html>
